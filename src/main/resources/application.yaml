server:
  port: ${PORT:8080}

logging:
  level:
    org.atmosphere: WARN

spring:
  mustache:
    check-template-location: false

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}

    # HikariCP Connection Pool Configuration
    hikari:
      # Pool sizing
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      idle-timeout: ${HIKARI_IDLE_TIMEOUT:600000} # 10 minutes
      max-lifetime: ${HIKARI_MAX_LIFETIME:1800000} # 30 minutes
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT:30000} # 30 seconds

      # Performance optimizations
      auto-commit: true
      pool-name: PortfolioHikariPool

      # Connection test
      connection-test-query: SELECT 1
      validation-timeout: ${HIKARI_VALIDATION_TIMEOUT:5000} # 5 seconds

      # Leak detection
      leak-detection-threshold: ${HIKARI_LEAK_DETECTION:60000} # 1 minute

      # PostgreSQL specific optimizations
      data-source-properties:
        cachePrepStmts: true
        prepStmtCacheSize: 250
        prepStmtCacheSqlLimit: 2048
        useServerPrepStmts: true
        useLocalSessionState: true
        rewriteBatchedStatements: true
        cacheResultSetMetadata: true
        cacheServerConfiguration: true
        elideSetAutoCommits: true
        maintainTimeStats: false

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true

vaadin:
  productionMode: false
  theme:
    name: mytheme

email:
  sender: "${EMAIL_SENDER:joleksiysurovtsev@gmail.com}"
  recipient: "${EMAIL_RECIPIENT:o.surovtsev@spd-ukraine.com}"
  api-key: "${SENDGRID_API_KEY:}"

github:
  github-token: "${GITHUB_TOKEN:}"
  github-owner: "${GITHUB_OWNER:joleksiysurovtsev}"